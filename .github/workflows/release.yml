name: Release Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create release zip
        run: |
          mkdir -p release
          zip -r release/roofr-calendar-scraper-v${{ steps.get_version.outputs.VERSION }}.zip \
            manifest.json \
            service_worker.js \
            content.js \
            popup.html \
            popup.js \
            options.html \
            options.js \
            config.js \
            themes.js \
            metadata.json \
            -x "*.map"

      - name: Build & sign CRX
        env:
          CRX_PRIVATE_KEY: ${{ secrets.CRX_PRIVATE_KEY }}
        run: |
          if [ -z "$CRX_PRIVATE_KEY" ]; then
            echo "::error::CRX_PRIVATE_KEY secret is empty. Refusing to build — a missing key would generate a NEW key and break the force-installed extension ID."
            exit 1
          fi
          printf '%s\n' "$CRX_PRIVATE_KEY" > extension.pem
          node scripts/build-crx.cjs
          EXPECTED=fkldnfkfppeicfcgmlnpknfkmnfkaabo
          ACTUAL=$(node scripts/get-crx-id.cjs | sed -n 's/^Extension ID: //p')
          echo "Built CRX ID: $ACTUAL (expected: $EXPECTED)"
          rm -f extension.pem
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::Signed CRX ID ($ACTUAL) does not match the force-installed ID ($EXPECTED). Wrong signing key — aborting so we never publish an undeployable crx."
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/roofr-calendar-scraper-v${{ steps.get_version.outputs.VERSION }}.zip
            releases/roofr-calendar-scraper.crx
          generate_release_notes: true
          body: |
            ## Roofr Calendar Scraper v${{ steps.get_version.outputs.VERSION }}

            ### How updates reach the team (automatic)
            This extension is force-installed company-wide via Google Workspace
            (Admin console -> Devices -> Chrome -> Apps & extensions). Every managed
            Chrome auto-updates from `updates.xml` within a few hours of this release.
            No one needs to download or reload anything.

            To pull the update immediately on a machine: open `chrome://policy` and
            click **Reload policies**, then check `chrome://extensions`.

            ### Manual install (testing only)
            Download `roofr-calendar-scraper.crx` below, or extract the `.zip` and
            load it unpacked at `chrome://extensions` with Developer mode enabled.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
